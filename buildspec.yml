version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - npm install -g npm@latest
      - npm install --legacy-peer-deps --silent
  build:
    commands:
      - npm run build --silent
  post_build:
    commands:
      - aws s3 sync ./dist s3://dashboard.pulsetechnologies.xyz/
